<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{fragments/htmlHead :: head}"></th:block>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Meine Wunschliste</title>
    <style>
        .nav-underline {
            margin-bottom: 30px;
        }
        .custom-nav-link .nav-link {
            color: #2e8b57 !important;
            font-size: 1.25rem;
            text-decoration: none;
        }
        .custom-nav-link .nav-link.active {
            text-decoration: underline;
        }
        img {
            max-width: 100%;
            max-height: 200px;
            object-fit: cover;
        }
        .card {
            border: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card a {
            text-decoration: none;
            color: inherit;
        }
        .search-bar {
            display: flex;
            align-items: center;
            border: 1px solid grey;
            border-radius: 25px;
            padding: 8px;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        .search-bar input {
            border: none;
            outline: none;
        }
        .search-bar input:focus {
            box-shadow: none;
        }
        .search-bar button {
            border: none;
            background-color: #ffffff;
            border-radius: 25px 25px 25px 25px;
            padding: 8px 10px;
            cursor: pointer;
        }
        .search-bar button i {
            color: #000;
        }
        .wishlist-image {
            cursor: pointer;
            width: 40px;
            height: 40px;
        }
        .wishlist-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }
        .draggable {
            cursor: move;
        }

        .droppable {
            border: 2px dashed #2e8b57;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table th, .comparison-table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<th:block th:insert="~{fragments/htmlNavBar :: navbar}"></th:block>

<div class="container mt-5 mb-5">
    <ul class="nav nav-underline">
        <li class="nav-item custom-nav-link">
            <a class="nav-link" href="/myPlantsForSale">Meine Verkäufe</a>
        </li>
        <li class="nav-item custom-nav-link">
            <a class="nav-link" href="/myPlants">Meine Pflanzen</a>
        </li>
        <li class="nav-item custom-nav-link">
            <a class="nav-link active" href="/myWishlist">Meine Wunschliste</a>
        </li>
    </ul>

    <div class="row mb-4">
        <div class="col-12">
            <form class="search-bar" th:action="@{/myWishlist}" method="get" onsubmit="return checkSearch()">
                <button class="btn" type="submit"><i class="bi bi-search"></i></button>
                <input class="form-control" id="name" name="name" label="Suche nach Name:" type="text" th:value="${name}" placeholder="Suche nach Name">
            </form>
        </div>
    </div>

    <div id="drop-container" class="droppable" ondrop="drop(event)" ondragover="allowDrop(event)">
        <p id="drag-instruction">Ziehe Pflanzen hierher, um sie zu vergleichen</p>
        <table class="comparison-table" hidden>
            <tbody>
            <tr id="imageRow"></tr>
            <tr id="nameRow"></tr>
            <tr id="priceRow"></tr>
            <tr id="heightRow"></tr>
            <tr id="potRow"></tr>
            <tr id="descriptionRow"></tr>
            </tbody>
        </table>
    </div>

    <div id="plants">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4">
            <th:block th:each="plant : ${wishlist}">
                <div class="col mb-4">
                    <div class="card h-100 draggable" draggable="true"
                         th:data-plant-id="${plant.plantId}"
                         th:data-plant-height="${plant.height}"
                         th:data-plant-potIncluded="${plant.potIncluded}"
                         th:data-plant-description="${plant.description}"
                         ondragstart="drag(event)">
                        <a th:href="@{/plants/{id}(id=${plant.plantId})}">
                            <img th:src="@{${plant.imagePath}}" class="card-img-top" alt="Pflanzenbild">
                        </a>
                        <div class="card-body">
                            <h5 class="card-title" th:text="${plant.name}">Plant Name</h5>
                            <p class="card-text" th:text="'Preis: ' + ${plant.price} + '€'">Plant Price</p>
                            <div class="wishlist-container">
                                <img th:src="@{'/plant-images/wishListButtonColoured.png'}"
                                     th:data-plant-id="${plant.plantId}"
                                     th:data-action="'remove'"
                                     class="wishlist-image"
                                     onclick="toggleWishlist(this)">
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </div>
</div>

<script>
    function checkSearch() {
        var searchField = document.getElementById("name").value;
        if (searchField.trim() === "") {
            window.location.href = "/myWishlist";
            return false;
        }
        return true;
    }

    function toggleWishlist(imageElement) {
        const plantId = imageElement.getAttribute('data-plant-id');
        const action = imageElement.getAttribute('data-action');
        const url = action === 'add' ? `/plants/wishlist/${plantId}` : `/plants/wishlist/remove/${plantId}`;

        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        fetch(url, {
            method: 'POST',
            headers: {
                [csrfHeader]: csrfToken,
            }
        })
            .then(response => {
                if (response.ok) {
                    if (action === 'add') {
                        imageElement.src = '/plant-images/wishListButtonColoured.png';
                        imageElement.setAttribute('data-action', 'remove');
                    } else {
                        imageElement.src = '/plant-images/wishListButtonBlack.png';
                        imageElement.setAttribute('data-action', 'add');
                    }
                } else {
                    console.error('Fehler beim Hinzufügen/Entfernen zur/von der Wunschliste.');
                }
            })
            .catch(error => {
                console.error('Fehler:', error);
            });
    }

    document.addEventListener('DOMContentLoaded', function () {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    });

    function drag(event) {
        event.dataTransfer.setData("plantId", event.target.getAttribute('data-plant-id'));
    }

    function allowDrop(event) {
        event.preventDefault();
    }

    function drop(event) {
        event.preventDefault();
        var plantId = event.dataTransfer.getData("plantId");
        var draggedElement = document.querySelector(`[data-plant-id="${plantId}"]`);

        if (!draggedElement) {
            console.error("Dragged element not found for plantId:", plantId);
            return;
        }
        var dropContainer = document.getElementById("drop-container");
        var comparisonTable = dropContainer.querySelector("table");

        if (comparisonTable.hidden) {
            comparisonTable.hidden = false;
            document.getElementById("drag-instruction").hidden = true;
        }

        var imageRow = document.getElementById("imageRow");
        var nameRow = document.getElementById("nameRow");
        var priceRow = document.getElementById("priceRow");
        var heightRow = document.getElementById("heightRow");
        var potRow = document.getElementById("potRow");
        var descriptionRow = document.getElementById("descriptionRow");

        var alreadyAdded = false;
        for (var i = 0; i < nameRow.cells.length; i++) {
            if (nameRow.cells[i].textContent === draggedElement.querySelector(".card-title").textContent) {
                alreadyAdded = true;
                break;
            }
        }

        if (alreadyAdded) {
            alert("Diese Pflanze wurde bereits hinzugefügt.");
            return;
        }


        if (imageRow.cells.length < 3) {
            var plantName = draggedElement.querySelector(".card-title").textContent;
            var plantPrice = draggedElement.querySelector(".card-text").textContent;
            var plantImageSrc = draggedElement.querySelector("img").src;
            var plantHeight = draggedElement.getAttribute('data-plant-height');
            var plantPotIncluded = draggedElement.getAttribute('data-plant-potIncluded') === 'true' ? 'Ja' : 'Nein';
            var plantDescription = draggedElement.getAttribute('data-plant-description');

            var imgCell = document.createElement("td");
            var img = document.createElement("img");
            img.src = plantImageSrc;
            img.style.width = "100px";
            imgCell.appendChild(img);

            var nameCell = document.createElement("td");
            nameCell.textContent = plantName;

            var priceCell = document.createElement("td");
            priceCell.textContent = plantPrice;

            var heightCell = document.createElement("td");
            heightCell.textContent = 'Höhe: ' + plantHeight + ' cm';

            var potCell = document.createElement("td");
            potCell.textContent = 'Topf enthalten: ' + plantPotIncluded;

            var descriptionCell = document.createElement("td");
            descriptionCell.textContent = 'Beschreibung: ' + plantDescription;

            imageRow.appendChild(imgCell);
            nameRow.appendChild(nameCell);
            priceRow.appendChild(priceCell);
            heightRow.appendChild(heightCell);
            potRow.appendChild(potCell);
            descriptionRow.appendChild(descriptionCell);
        } else {
            alert("Du kannst maximal 3 Pflanzen vergleichen.");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
